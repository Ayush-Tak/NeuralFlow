[project]
name = "neuralflow-github-mcp"
version = "0.1.0"
description = "GitHub MCP server for NeuralFlow."
requires-python = ">=3.12"
dependencies = [
    "mcp",
    "httpx",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["server"]

